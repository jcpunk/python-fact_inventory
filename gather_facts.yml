---
# ansible-playbook gather_facts.yml
#
# This playbook collects system and package facts from the target host
# and submits them to the fact_inventory API.
#
# The URL below assumes the service is deployed behind a reverse proxy
# that maps /fact_inventory to the ASGI app.  Adjust the host, port,
# and path prefix to match your environment.
# See docs/DEPLOYMENT.md for nginx and Apache configuration examples.
- name: Gather facts on system
  hosts: localhost
  gather_facts: no # gather with custom logic
  tasks:
    - name: Gather ansible system facts
      ansible.builtin.setup:
        gather_subset:
          - "all"
          - "!facter"
          - "!ohai"
      become: true

    - name: Gather the package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Make POST request with ansible_facts
      ansible.builtin.uri:
        url: http://127.0.0.1:8000/fact_inventory/v1/facts
        method: POST
        body_format: json
        body:
          system_facts: >-
            {{
              ansible_facts
              | dict2items
              | rejectattr('key', 'in', ['ansible_local', 'packages'])
              | items2dict
              | combine({'ansible_version': ansible_version})
            }}
          package_facts: >-
            {{ ansible_facts.packages | default({}) }}
          local_facts: >-
            {{ ansible_facts.ansible_local | default({}) }}
        status_code: 201
